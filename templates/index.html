<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SYRA - Smart Voice Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet"href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
 
<div class="main-container">
    <div class="chat-container">

        <div class="logo">
            <img src="{{ url_for('static', filename='logo.jpeg') }}" alt="SYRA Logo">
        </div>


        <div class="input-box">
        <input type="text" id="command-input" placeholder="Type your command here...">

        <button id="mic-btn" class="icon-btn mic-btn"> 
            <i class="fas fa-microphone"></i>
        </button>

        <button id="send-btn" class="icon-btn send-btn">
            <i class="fas fa-paper-plane"></i>
        </button>

    </div>

     <div id="response">
            Assistant is waiting for your command...
        </div>
    </div>

    <div class="history-panel">
    <h3>Chat History</h3>
    <div id="history-list"></div>
    </div>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
